<!DOCTYPE html>
<html>
<head>
    <title>Video Text Editor</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            margin-top: 20px;
        }

        td, th {
            border: 1px solid #ddd;
            padding: 8px;
        }

        textarea {
            width: 100%;
            height: 60px;
        }

        button {
            padding: 10px 20px;
            margin: 10px 5px;
            cursor: pointer;
        }

        #status {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>🎬 Video Text Editor</h1>

<input type="file" id="file">
<button onclick="upload()">Process Video</button>
<button onclick="clearData()">Clear Session</button>

<p id="status"></p>

<h2>Segments</h2>

<table id="table">
    <thead>
        <tr>
            <th>Start</th>
            <th>End</th>
            <th>Edit Text</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<button onclick="generate()">Generate Clips</button>
<button onclick="download()">Download TXT</button>

<script>
let segmentsData = [];
let videoPath = "";

// ==============================
// LOAD SAVED DATA ON REFRESH
// ==============================
window.onload = function () {
    const savedSegments = localStorage.getItem("segments");
    const savedVideo = localStorage.getItem("videoPath");

    if (savedSegments && savedVideo) {
        segmentsData = JSON.parse(savedSegments);
        videoPath = savedVideo;

        renderTable();

        document.getElementById("status").innerText = "📂 Restored previous session";
    }
};

// ==============================
// UPLOAD + PROCESS
// ==============================
async function upload() {
    const file = document.getElementById('file').files[0];

    if (!file) {
        alert("Please select a video file");
        return;
    }

    document.getElementById("status").innerText = "⏳ Processing video...";

    const formData = new FormData();
    formData.append("file", file);

    const res = await fetch("/process", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    segmentsData = data.segments;
    videoPath = data.video_path;

    // ✅ SAVE DATA
    localStorage.setItem("segments", JSON.stringify(segmentsData));
    localStorage.setItem("videoPath", videoPath);

    renderTable();

    document.getElementById("status").innerText = "✅ Edit text and generate clips";
}

// ==============================
// RENDER TABLE
// ==============================
function renderTable() {
    const tbody = document.querySelector("#table tbody");
    tbody.innerHTML = "";

    segmentsData.forEach((seg, index) => {
        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${seg.start.toFixed(2)}</td>
            <td>${seg.end.toFixed(2)}</td>
            <td>
                <textarea onchange="updateText(${index}, this.value)">
${seg.text}
                </textarea>
            </td>
        `;

        tbody.appendChild(row);
    });
}

// ==============================
// UPDATE TEXT + SAVE
// ==============================
function updateText(index, value) {
    segmentsData[index].text = value;

    // ✅ SAVE EDITS
    localStorage.setItem("segments", JSON.stringify(segmentsData));
}

// ==============================
// GENERATE CLIPS
// ==============================
async function generate() {
    document.getElementById("status").innerText = "✂️ Generating clips...";

    await fetch("/generate", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            segments: segmentsData,
            video_path: videoPath
        })
    });

    document.getElementById("status").innerText = "🎉 Clips generated successfully!";
}

// ==============================
// DOWNLOAD TXT
// ==============================
function download() {
    let text = "";

    segmentsData.forEach(seg => {
        text += `[${seg.start} - ${seg.end}] ${seg.text}\n`;
    });

    const blob = new Blob([text], { type: "text/plain" });

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "output.txt";
    a.click();
}

// ==============================
// CLEAR SESSION
// ==============================
function clearData() {
    localStorage.clear();
    location.reload();
}
</script>

</body>
</html>
